spring:
  application:
    name: "googel-gen-ai-spring"
  datasource:
    url: jdbc:postgresql://localhost:5432/aidb
    username: myuser
    password: mypassword
    driver-class-name: org.postgresql.Driver
  ai:
    vectorstore:
      pgvector:
        # index-type: HNSW      # 대규모 검색에 효율적인 인덱스 방식
        dimension: 768        # Gemini Embedding 모델의 기본 차원 (모델에 따라 확인 필요)
        collection-name: spring_pdf_rag
    ollama:
      base-url: http://localhost:11434
      embedding:
        options:
          model: all-minilm
    google:
      genai:
        # spring AI 1.1.2>채팅모델>Google GenAI 규격인데 동작안함
        api-key: ${GOOGLE_API_KEY:missing_key}
        chat:
          options:
            model: gemini-3.1-flash-lite-preview
        # spring AI 1.1.2>임베딩모델>Google GenAI 규격인데 동작안함
        embedding:
          api-key: ${GOOGLE_API_KEY:missing_key}
          text:
            options:
              model: gemini-embedding-001 # 3072 지원함
              task-type: RETRIEVAL_DOCUMENT # 문서 저장 시
    mcp:
      client:
        enabled: true
        initialized: true
        type: ASYNC
        request-timeout: 2s
        toolcallback:
          enabled: true
        streamable-http:
          connections:
            google-calendar:
              url: http://localhost:8000
              endpoint: /mcp
#        stdio:
#          root-change-notification: true
#          connections:
#            server1:
#              command: /path/to/server
#              args:
#                - --port=8080
#                - --mode=production
#              env:
#                API_KEY: your-api-key
#                DEBUG: "true"
#         claude desktop 형식으로 사용할 때
#          servers-configuration: classpath:mcp-servers.json

  jackson:
    default-property-inclusion: non_null
  data:
    redis:
      host: localhost
      port: 6379
      connect-timeout: 2000 # 2초
# 왜인지 gemenai 가 configuration 이 안맞아서 custom 으로함
ai:
  api-key: ${GOOGLE_API_KEY:missing_key}
  model: gemini-3.1-flash-lite-preview # 3.1-flash-lite-preview가 안될 경우를 대비해 안정 버전 권장
  default-system: "너는 20년 경력의 시니어 개발자야. 친절하고 간결하게 대답해줘."
  embed-model: gemini-embedding-001
  prompts:
    intent-route: classpath:prompts/intent-route.st
    general: classpath:prompts/general.st
    rag: classpath:prompts/rag.st
    sql: classpath:prompts/sql.st
    chart: classpath:prompts/chart.st
    digital-marketer: classpath:prompts/digital-marketer.st
    data-scientist: classpath:prompts/data-scientist.st
        
#logging:
#  level:
#    root: INFO #DEBUG

logging:
  level:
    org.springframework.ai.chat.client.advisor.*: DEBUG
    jm.kr.spring.ai.playground.service.*: DEBUG
    org.springframework.ai.mcp: DEBUG
    
management:
  endpoints:
    web:
      exposure:
        include: "health,info,metrics,prometheus" # prometheus 엔드포인트 포함
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true
        spring.ai.chat.client.calls: true # AI 호출 지표 상세화