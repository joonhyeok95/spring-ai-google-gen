<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Notion 연동 결과</title>
    <style>
        body { font-family: 'Pretendard', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f4f4f4; }
        .card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; width: 400px; }
        .success { color: #2ecc71; }
        .error { color: #e74c3c; }
        .code-box { background: #eee; padding: 10px; border-radius: 5px; font-family: monospace; word-break: break-all; margin-top: 1rem; }
        .btn { display: inline-block; margin-top: 20px; padding: 10px 20px; background: #000; color: #fff; text-decoration: none; border-radius: 6px; }
    </style>
</head>
<body>
    <div class="card">
        <h2 th:class="${status == 'success' ? 'success' : 'error'}" 
            th:text="${status == 'success' ? '연동 성공!' : '연동 실패'}">결과 상태</h2>
        
        <p th:text="${message}">결과 메시지 내용</p>

        <div th:if="${code != null}" class="code-box">
            <strong>Auth Code:</strong> <span th:text="${code}"></span>
        </div>

        <a href="/" class="btn">메인으로 돌아가기</a>
    </div>
</body>
</html>
