<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>AI Document Assistant</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- 마크다운 스타일 -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <style>
        #chat-content { height: 600px; overflow-y: auto; border: 1px solid #ddd; padding: 20px; background: #fdfdfd; border-radius: 8px; }
        .user-msg { background: #e3f2fd; padding: 10px; border-radius: 10px; margin-bottom: 10px; text-align: right; }
        .ai-msg { background: #f1f3f4; padding: 10px; border-radius: 10px; margin-bottom: 10px; white-space: pre-wrap; }
        .cursor { display: inline-block; width: 8px; height: 18px; background: #333; animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        
        /* chat.html 내부 <style>에 추가 */
        .ai-msg { 
            line-height: 1.6; 
            font-size: 0.95rem;
            padding: 15px;
        }
        .ai-msg h1, .ai-msg h2, .ai-msg h3 { margin-top: 15px; font-weight: bold; }
        .ai-msg ul, .ai-msg ol { padding-left: 20px; }
        .ai-msg code { background: #f0f0f0; padding: 2px 4px; border-radius: 4px; font-family: 'Courier New', monospace; }
        .ai-msg pre { background: #2d2d2d; color: #ccc; padding: 15px; border-radius: 8px; overflow-x: auto; }
        .ai-msg blockquote { border-left: 4px solid #ddd; padding-left: 15px; color: #666; font-style: italic; }
    </style>
</head>
<body class="container py-5">

<h2 class="mb-4 text-primary">📄 Local AI RAG 스트리밍 챗봇</h2>

<div id="chat-content" class="mb-3 d-flex flex-column">
    </div>

<div class="input-group">
    <input type="text" id="userInput" class="form-control" placeholder="질문을 입력하세요 (예: Zabbix 설치 방법 알려줘)" onkeyup="if(event.keyCode==13) send()">
    <button class="btn btn-primary" onclick="send()">전송</button>
</div>

<script th:inline="javascript">
    let accumulatedText = ""; // 👈 전체 텍스트 저장용
    let typingQueue = []; // 글자 저장 창고
    let isTyping = false; // 현재 타이핑 중인지 확인

    // 1. 타이핑 효과를 내는 함수
    function startTyping(element, container, context) {
        if (isTyping) return;
        isTyping = true;

        const interval = setInterval(() => {
            if (typingQueue.length > 0) {
                // 창고에서 한 글자(또는 한 단어) 꺼내서 화면에 추가
                const char = typingQueue.shift();
                context.accumulatedText += char; // 전달받은 컨텍스트에 누적                
                
                // 2. 마크다운 변환 후 HTML로 주입
                element.innerHTML = marked.parse(context.accumulatedText);
                // 3. 코드 블록이 있다면 하이라이팅 적용
                if (window.Prism) Prism.highlightAllUnder(element);
                
                container.scrollTop = container.scrollHeight;
            } else if (context.isFinished) { // ✅ 수정 2: 데이터 공급이 끝났고 큐도 비었으면 종료
                clearInterval(interval);
                isTyping = false;
            }
        }, 20); // 👈 마크다운 렌더링 부하를 고려해 20~30ms 추천
    }    

    // 로컬 스토리지에 chatId 저장 (메모리 유지용)
    let chatId = localStorage.getItem('chatId') || 'user-' + Math.random().toString(36).substring(2, 11);
    localStorage.setItem('chatId', chatId);

    async function send() {
        const input = document.getElementById('userInput');
        const message = input.value.trim();
        if (!message) return;
        
        // 개별 질문마다 독립적인 텍스트 누적
        const context = {
            accumulatedText: "",
            isFinished: false
        };
        const chatContent = document.getElementById('chat-content');

        // 1. 사용자 메시지 추가
        const userDiv = document.createElement('div');
        userDiv.className = 'user-msg';
        userDiv.innerText = message;
        chatContent.appendChild(userDiv);
        input.value = '';

        // 2. AI 답변 박스 생성 (커서 포함)
        const aiDiv = document.createElement('div');
        aiDiv.className = 'ai-msg';
        const textSpan = document.createElement('span');
        const cursor = document.createElement('span');
        cursor.className = 'cursor';
        aiDiv.appendChild(textSpan);
        aiDiv.appendChild(cursor);
        chatContent.appendChild(aiDiv);

        chatContent.scrollTop = chatContent.scrollHeight;

        // 3. 스트리밍 요청
        const url = `/chat/stream?chatId=${chatId}&message=${encodeURIComponent(message)}`;
        const response = await fetch(url);
        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        
        let buffer = ''; // 👈 핵심: 불완전하게 잘린 데이터를 담을 버퍼       
        const currentChatContext = {
            accumulatedText: "",
            isFinished: false
        };

        typingQueue = [];
        
        // 타이핑 엔진 가동 (컨텍스트 전달)
        startTyping(textSpan, chatContent, currentChatContext);
        
        while (true) {
            const { done, value } = await reader.read();
            if (done) {
                currentChatContext.isFinished = true; // 서버 응답 끝남을 알림
                break;
            }
            
            buffer += decoder.decode(value, { stream: true });
            let parts = buffer.split('\n');
            buffer = parts.pop(); 
            
            for (const line of parts) {
                const trimmedLine = line.trim();
                if (trimmedLine.startsWith('data:')) {
                    const content = trimmedLine.substring(5).trim();
                    if (!content || content === '[DONE]') continue; 

                    for (let char of content) {
                        typingQueue.push(char);
                    }
                }
            }
        }
        
        // 답변 완료 후 커서 제거
        const cursorRemover = setInterval(() => {
            if (!isTyping) {
                cursor.remove();
                clearInterval(cursorRemover);
            }
        }, 500);
    }
</script>

</body>
</html>
